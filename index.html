  <body>
    <!-- Skip to main content for accessibility -->
    <a
      href="#main-content"
      style="
        position: absolute;
        top: -100%;
        left: 0;
        background: #000;
        color: #fff;
        padding: 8px 16px;
        z-index: 9999;
        font-size: 14px;
        text-decoration: none;
        font-family: monospace;
      "
      onfocus="this.style.top='0'"
      onblur="this.style.top='-100%'"

    </a>
